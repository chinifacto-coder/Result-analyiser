<!DOCTYPE html>
<html>
<head>
<title>Class 12 Results</title>

<style>
body{
    background:black;
    color:white;
    text-align:center;
    font-family:Arial, sans-serif;
    margin:0;
}

#loading{
    margin-top:40vh;
    font-size:40px;
}

#prank{
    display:none;
}

#quote{
    font-size:42px;
    font-weight:bold;
    margin-top:20px;
    display:none;
}

#viewBtn{
    margin-top:20px;
    padding:15px 25px;
    font-size:20px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="loading">
    All Class 12 Results Showing In Few Seconds...
</div>

<div id="prank">

    <button id="viewBtn" onclick="showResult()">
        View Result
    </button>

    <div id="quote">
        REALLY BRO 💀<br>
        YOU THINK YOUR SMART<br>
        SYBAU 🥀
    </div>

    <img id="img" src="smart.jpg" width="700" alt="Prank Image" style="display:none;">

</div>

<audio id="sound">
    <source src="sound.mp3" type="audio/mpeg">
</audio>

<script>
const sound = document.getElementById("sound");

// after 4 seconds show button
setTimeout(function(){
    document.getElementById("loading").style.display = "none";
    document.getElementById("prank").style.display = "block";
}, 4000);

// when user clicks button
function showResult() {
    document.getElementById("viewBtn").style.display = "none";
    document.getElementById("quote").style.display = "block";
    document.getElementById("img").style.display = "block";

    sound.currentTime = 0;
    sound.play().catch(function(e){
        console.log("Audio blocked");
    });
}
</script>

</body>
</html>
